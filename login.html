<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - ReservaHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Acessar Conta</h2>
        <form id="loginForm">
            <div class="search-group">
                <label>E-MAIL</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="search-group">
                <label>SENHA</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn-search" style="width: 100%; margin-top: 20px;">ENTRAR</button>
        </form>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
        <p>Não tem uma conta?</p>
        <a href="cadastro.html" class="btn-login" style="display: block; text-align: center; margin-top: 10px;">Cadastrar Usuário</a>
    </div>
</body>
</html>

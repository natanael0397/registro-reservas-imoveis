<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - ReservaHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Criar Nova Conta</h2>
        <form id="cadastroForm">
            <div class="search-group">
                <label>Nome completo</label>
                <input type="text" id="nome" required>
            </div>
            <div class="search-group">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="search-group">
                <label>Senha</label>
                <input type="password" id="senha" required>
            </div>
            <div class="search-group">
                <label>Voce é:</label>
                <select id="tipo_usuario">
                    <option value="cliente">Quero Alugar (Cliente)</option>
                    <option value="proprietario">Sou Proprietário</option>
                </select>
            </div>
            <button type="submit" class="btn-search" style="width: 100%; margin-top: 20px;">FINALIZAR CADASTRO</button>
        </form>
        <a href="login.html" style="display: block; margin-top: 15px; text-align: center; color: #64748b; font-size: 0.9rem;">Já tenho conta? Voltar ao Login</a>
    </div>
</body>
</html>
